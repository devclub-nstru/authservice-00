name: Deploy

on:
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - run: go mod download
            - run: go build -o ./tmp/server ./cmd/server && go build -o ./tmp/worker ./cmd/worker

    deploy:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Create .env
              run: |
                  echo "${{ secrets.ENV }}" > .env

            - name: Upload Project
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  source: "."
                  target: "/opt/myapp"

            - name: Deploy
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      cd /opt/myapp

                      docker compose down
                      docker compose up -d --build

                      docker image prune -af
