  /oidc/token:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Exchange an authorization code for tokens, or refresh an access
        token using a refresh token
      parameters:
      - description: Grant type (authorization_code or refresh_token)
        in: formData
        name: grant_type
        required: true
        type: string
      - description: Authorization code (required only for authorization_code grant)
        in: formData
        name: code
        type: string
      - description: Redirect URI used in authorize (required only for authorization_code
          grant)
        in: formData
        name: redirect_uri
        type: string
      - description: Client ID
        in: formData
        name: client_id
        required: true
        type: string
      - description: Client secret (required for confidential clients)
        in: formData
        name: client_secret
        type: string
      - description: PKCE code verifier (required only when PKCE was used)
        in: formData
        name: code_verifier
        type: string
      - description: Refresh token (required only for refresh_token grant)
        in: formData
        name: refresh_token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/oidc.TokenResponse'
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: OIDC Token
      tags:
      - oidc
