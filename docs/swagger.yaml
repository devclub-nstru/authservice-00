basePath: /
definitions:
  auth.AuthResponse:
    properties:
      mfa_methods:
        items:
          type: string
        type: array
      mfa_required:
        type: boolean
      mfa_token:
        type: string
      user:
        $ref: '#/definitions/auth.UserResponse'
    type: object
  auth.ConnectedClientResponse:
    properties:
      avatar_url:
        type: string
      client_id:
        type: string
      connected_at:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  auth.EmailResendRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.EmailUpdateRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.EmailVerifyRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.MFAVerifyRequest:
    properties:
      challenge_token:
        type: string
      code:
        type: string
      factor:
        type: string
    required:
    - challenge_token
    - code
    - factor
    type: object
  auth.PasswordChangeRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  auth.PasswordForgotRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.PasswordResetRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  auth.PasswordSetRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  auth.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.UserResponse:
    properties:
      avatar_url:
        type: string
      clients:
        items:
          $ref: '#/definitions/auth.ConnectedClientResponse'
        type: array
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
      mfa_enabled:
        items:
          type: string
        type: array
      name:
        type: string
      oauth_accounts:
        items:
          type: string
        type: array
    type: object
  clients.ClientResponse:
    properties:
      avatar_url:
        type: string
      client_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  clients.CreateClientRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
      redirect_uris:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - redirect_uris
    type: object
  clients.CreateClientResponse:
    properties:
      client:
        $ref: '#/definitions/clients.ClientResponse'
      client_secret:
        type: string
    type: object
  clients.MemberProfile:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      joined_at:
        type: string
      name:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  clients.RotateSecretResponse:
    properties:
      client_secret:
        type: string
    type: object
  clients.UpdateClientRequest:
    properties:
      avatar_url:
        type: string
      name:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
    type: object
  health.DBCheckResponse:
    properties:
      error:
        example: 'dial tcp 127.0.0.1:5432: connect: connection refused'
        type: string
      status:
        example: db ok
        type: string
    type: object
  health.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  httpx.ErrorResponse:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  httpx.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/httpx.ErrorResponse'
      success:
        type: boolean
    type: object
  mfa.EmailVerifyRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  mfa.TOTPVerifyRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  oidc.DiscoveryDocument:
    properties:
      authorization_endpoint:
        type: string
      code_challenge_methods_supported:
        items:
          type: string
        type: array
      grant_types_supported:
        items:
          type: string
        type: array
      id_token_signing_alg_values_supported:
        items:
          type: string
        type: array
      introspection_endpoint:
        type: string
      issuer:
        type: string
      jwks_uri:
        type: string
      response_types_supported:
        items:
          type: string
        type: array
      revocation_endpoint:
        type: string
      scopes_supported:
        items:
          type: string
        type: array
      subject_types_supported:
        items:
          type: string
        type: array
      token_endpoint:
        type: string
      token_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      userinfo_endpoint:
        type: string
    type: object
  oidc.IntrospectResponse:
    properties:
      active:
        type: boolean
      client_id:
        type: string
      exp:
        type: integer
      iat:
        type: integer
      scope:
        type: string
      sub:
        type: string
      token_type:
        type: string
    type: object
  oidc.JWK:
    properties:
      alg:
        type: string
      e:
        type: string
      kid:
        type: string
      kty:
        type: string
      "n":
        type: string
      use:
        type: string
    type: object
  oidc.JWKSDocument:
    properties:
      keys:
        items:
          $ref: '#/definitions/oidc.JWK'
        type: array
    type: object
  oidc.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      id_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  oidc.UserInfoResponse:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      name:
        type: string
      picture:
        type: string
      sub:
        type: string
    type: object
info:
  contact: {}
  description: Auth API for devclub services.
  title: Kael API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Return the public RSA keys used to verify ID tokens
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/oidc.JWKSDocument'
      summary: JWKS
      tags:
      - oidc
  /.well-known/openid-configuration:
    get:
      description: Return the OpenID Connect discovery document
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/oidc.DiscoveryDocument'
      summary: OIDC Discovery
      tags:
      - oidc
  /auth/email/resend:
    post:
      consumes:
      - application/json
      description: Resend the email verification link to the user
      parameters:
      - description: Email resend payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.EmailResendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
      summary: Resend verification email
      tags:
      - auth
  /auth/email/update:
    post:
      consumes:
      - application/json
      description: Update user email address and send new verification link
      parameters:
      - description: Email update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.EmailUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Update email
      tags:
      - auth
  /auth/email/verify:
    post:
      consumes:
      - application/json
      description: Verify email using the token from the verification email
      parameters:
      - description: Email verify payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.EmailVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
      summary: Verify email
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password and return session token
        or MFA challenge
      parameters:
      - description: Login request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.AuthResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      description: Revoke the current session token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get the profile of the currently authenticated user, including
        connected clients
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Get current user
      tags:
      - auth
  /auth/me/clients/{id}:
    delete:
      description: Disconnect the current user from a client and revoke all client
        tokens
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Disconnect client
      tags:
      - auth
  /auth/mfa/verify:
    post:
      consumes:
      - application/json
      description: Complete login by verifying an MFA factor (OTP/TOTP)
      parameters:
      - description: MFA verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.MFAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Verify MFA
      tags:
      - auth
  /auth/password/change:
    post:
      consumes:
      - application/json
      description: Change password for an authenticated user
      parameters:
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.PasswordChangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Change password
      tags:
      - auth
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Send a password reset email to the user
      parameters:
      - description: Forgot password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.PasswordForgotRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
      summary: Forgot password
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      description: Reset password using the token from the reset email
      parameters:
      - description: Reset password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.PasswordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Reset password
      tags:
      - auth
  /auth/password/set:
    post:
      consumes:
      - application/json
      description: Set password for a user who doesn't have one (e.g. OAuth only)
      parameters:
      - description: Set password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.PasswordSetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Set password
      tags:
      - auth
  /auth/refresh:
    post:
      description: Rotate the session token using a valid session cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.AuthResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Refresh session
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Signup request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
        "409":
          description: Conflict
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Register a new user
      tags:
      - auth
  /clients:
    get:
      description: List all OAuth clients owned by the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/clients.ClientResponse'
                  type: array
              type: object
      summary: List clients
      tags:
      - clients
    post:
      consumes:
      - application/json
      description: Register a new OAuth client application
      parameters:
      - description: Client creation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/clients.CreateClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/clients.CreateClientResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Create client
      tags:
      - clients
  /clients/{id}:
    delete:
      description: Permanently delete a client and all associated data
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Delete client
      tags:
      - clients
    get:
      description: Get details of a specific OAuth client
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/clients.ClientResponse'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Get client
      tags:
      - clients
    patch:
      consumes:
      - application/json
      description: Update name, avatar, or redirect URIs of a client
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/clients.UpdateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Update client
      tags:
      - clients
  /clients/{id}/members/{userId}:
    delete:
      description: Revoke a user's membership from a client
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      - description: User UUID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  additionalProperties:
                    type: boolean
                  type: object
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Remove member
      tags:
      - clients
  /clients/{id}/rotate-secret:
    post:
      description: Generate a new client secret (old secret becomes invalid)
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                data:
                  $ref: '#/definitions/clients.RotateSecretResponse'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: Rotate client secret
      tags:
      - clients
  /clients/{id}/users:
    get:
      description: List all users who are members of a client
      parameters:
      - description: Client UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
