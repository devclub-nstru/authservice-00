  /oidc/authorize:
    get:
      description: Start the OIDC Authorization Code flow. Requires an active platform
        session.
      parameters:
      - description: Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: Redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Response type (must be 'code')
        in: query
        name: response_type
        required: true
        type: string
      - description: Requested scopes
        in: query
        name: scope
        type: string
      - description: CSRF state parameter
        in: query
        name: state
        type: string
      - description: Nonce for ID token
        in: query
        name: nonce
        type: string
      - description: PKCE code challenge
        in: query
        name: code_challenge
        type: string
      - description: PKCE method (S256)
        in: query
        name: code_challenge_method
        type: string
      responses:
        "302":
          description: Redirect to login if no session
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/httpx.Response'
            - properties:
                error:
                  $ref: '#/definitions/httpx.ErrorResponse'
              type: object
      summary: OIDC Authorize
      tags:
      - oidc
